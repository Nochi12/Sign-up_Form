<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left-side">
                <div class="left-side-up">
                    <img class="logo" src="./pic/logo.png" alt="odin-logo">
                    <h1>ODIN</h1>
                </div>
                <div class="left-side-down">
                        Photo by <a href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie West</a> on 
                        <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
                </div>
        </div>
        
        <div class="right-side">
            <div class="right-side-up">
                <h1>
                This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.
               <br> Sign up now to get started.
            </h1>
            <br>
            <h1>
                You know you want to.
            </h1>
            </div>   
                <form action="#" class="right-side-middle">
                    <h1>
                        Let's do this!
                    </h1>
                    <div class="form-row">
                        <div class="form-item">
                            <label for="first-name">FIRST NAME *</label>
                            <input type="text" id="first-name" first-name="first-name" required>
                        </div>
                      

                      <div class="form-item">
                            <label for="last-name">LAST NAME*</label>
                            <input type="text" id="last-name" last-name="last-name">
                        </div>
                    </div>
                    
                      <div class="form-row">
                            <div class="form-item">
                                <label for="email">EMAIL*</label>
                                <input type="email" name="email" id="email" required>
                            </div>
                            <div class="form-item">
                                <label for="number">PHONE NUMBER</label>
                                <input type="number" name="number" id="number">
                            </div>
                      </div>

                       <div class="form-row">

                            <div class="form-item">
                                <label for="password">PASSWORD</label>
                                <input type="password" name="password" id="password">
                            </div>


                            <div class="form-item">
                                <label for="confirm_password">PASSWORD</label>
                                <input  type="password" 
                                        name="confirm_password" 
                                        id="confirm_password">
                            </div>
                       </div>

                </form>
        </div>
    </div>
</body>
</html>
